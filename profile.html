<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 血社火文化传承</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a class="brand" href="index.html">
                <img src="images/logo.png" alt="血社火文化标识">
                <span>血社火文化</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="data.html">数据</a></li>
                <li><a href="culture.html">文创</a></li>
                <li><a href="profile.html" class="active">我的</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header compact">
            <p class="eyebrow">会员中心</p>
            <h1>登录后收藏文章和文创产品</h1>
            <p>注册账号后可以保存喜欢的文创方案、整理调研记录，并继续参与血社火文化传播计划。</p>
        </header>

        <section class="auth-layout">
            <div class="auth-panel">
                <div class="auth-tabs" role="tablist">
                    <button class="auth-tab active" data-auth-mode="login" type="button">登录</button>
                    <button class="auth-tab" data-auth-mode="register" type="button">注册</button>
                </div>

                <form id="auth-form" class="auth-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" autocomplete="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group register-only hidden">
                        <label for="confirm-password">确认密码</label>
                        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" placeholder="请再次输入密码">
                    </div>
                    <button type="submit" class="btn primary full-width" id="auth-submit">登录</button>
                </form>

                <p class="auth-status" id="auth-status">当前未登录</p>
            </div>

            <aside class="member-card">
                <span class="avatar" id="member-avatar">未</span>
                <h2 id="member-name">访客</h2>
                <p>完成登录后，你的收藏会保存在当前浏览器；启动 Flask 后，账号会写入本地 SQLite 数据库。</p>
                <button class="btn secondary" id="logout-button" type="button">退出登录</button>
            </aside>
        </section>

        <section class="dashboard-grid">
            <article class="profile-section">
                <h2>我的收藏</h2>
                <ul class="collection-list" id="collection-list"></ul>
            </article>

            <article class="profile-section">
                <h2>账号设置</h2>
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" name="email" placeholder="请输入邮箱地址">
                </div>
                <div class="form-group">
                    <label for="phone">手机号码</label>
                    <input type="tel" id="phone" name="phone" placeholder="请输入手机号码">
                </div>
                <button class="btn" id="save-settings" type="button">保存设置</button>
            </article>

            <article class="profile-section">
                <h2>我的贡献</h2>
                <div class="stats-list">
                    <p><strong>3</strong><span>次问卷调研</span></p>
                    <p><strong>4</strong><span>篇文章收藏</span></p>
                    <p><strong>2</strong><span>次内容分享</span></p>
                </div>
            </article>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="assets/js/auth.js"></script>
</body>

</html>
