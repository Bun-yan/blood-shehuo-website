services:
  - type: web
    name: blood-shehuo-website
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /data/users.db
    disk:
      name: blood-shehuo-data
      mountPath: /data
      sizeGB: 1
